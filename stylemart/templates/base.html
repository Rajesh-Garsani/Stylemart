<!DOCTYPE html>
{% load static %}
{% load currency %}

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StyleMart - Modern E-Commerce</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

{% include 'partials/_header.html' %}

    {% if messages %}
        <div class="container mt-3 position-absolute top-0 start-50 translate-middle-x" style="z-index: 1050;">
           {% for message in messages %}
              <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow" role="alert">
                   {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          </div>
    {% endif %}

<main class="flex-shrink-0 pt-4 pb-5">
  {% block content %}{% endblock %}
</main>

{% include 'partials/_footer.html' %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/main.js' %}"></script>

</body>
</html>
